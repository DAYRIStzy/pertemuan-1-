<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Mahasiswa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #764ba2;
            margin-top: 20px;
            margin-bottom: 15px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        h3 {
            color: #555;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        table tr:nth-child(odd) {
            background-color: #f8f9fa;
        }

        table tr:nth-child(even) {
            background-color: #f0f1f5;
        }

        table tr:hover {
            background-color: #e8e9f0;
            transition: 0.3s ease;
        }

        table td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        table td:first-child {
            background-color: #667eea;
            color: white;
            font-weight: bold;
            width: 40%;
        }

        img {
            max-width: 200px;
            margin: 20px auto;
            display: block;
            border-radius: 10px;
            border: 3px solid #667eea;
        }

        a {
            color: #667eea;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 5px;
            transition: 0.3s ease;
            display: inline-block;
        }

        a:hover {
            background-color: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s ease;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        .nav-buttons {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #667eea;
        }

        br {
            content: "";
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pemrograman Web</h1>

        <h2>Nama : RISKI ILAHI</h2>

        <h3>NPM : 243510408</h3>

        <h3>Kelas : 4D</h3>

        <h2>Biodata</h2>
        <table>
            <tr>
                <td>Nama Lengkap</td>
                <td>RISKI ILAHI</td>
            </tr>
            <tr>
                <td>NPM</td>
                <td>243510408</td>
            </tr>
            <tr>
                <td>Kelas</td>
                <td>4D</td>
            </tr>
            <tr>
                <td>Tempat Tanggal Lahir</td>
                <td>-</td>
            </tr>
            <tr>
                <td>Alamat</td>
                <td>-</td>
            </tr>
            <tr>
                <td>No. Telepon</td>
                <td>-</td>
            </tr>
            <tr>
                <td>Email</td>
                <td>-</td>
            </tr>
        </table>
        
        <img src="" alt="Foto Profil">

        <div style="text-align: center; margin: 20px 0;">
            <a href="ini abaout">About</a>
            <a href="this tentang">Tentang</a>
        </div>

        <div class="nav-buttons">
            <button onclick="window.location.href='index.html'">← Sebelumnya</button>
            <button onclick="window.location.href='index.html'">Selanjutnya →</button>
        </div>
    </div>
</body>
</html>
